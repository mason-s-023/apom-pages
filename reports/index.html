<style>
  :root{--bg:#f7f6f3;--paper:#fff;--ink:#171717;--muted:#66645f;--line:#e7e4dc;--accent:#4f46e5;--shadow:0 12px 34px rgba(23,23,23,.07)}
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;background:linear-gradient(180deg,#fbfaf8 0%,var(--bg) 100%);color:var(--ink);padding:24px 14px 52px;line-height:1.6;word-break:keep-all;overflow-wrap:anywhere}
  .wrap{width:min(100%,900px);margin:0 auto}

  h1{font-size:clamp(30px,10vw,44px);line-height:1.08;letter-spacing:-.055em;margin:0 0 8px}
  p{color:var(--muted);margin:0 0 24px;font-size:15.5px}.grid{display:grid;grid-template-columns:1fr;gap:12px}.card{display:block;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:18px;text-decoration:none;color:inherit;box-shadow:var(--shadow)}.label{font-size:11px;font-weight:950;color:var(--accent);letter-spacing:.11em;text-transform:uppercase;margin-bottom:8px}.title{font-size:18px;font-weight:900;margin-bottom:6px;letter-spacing:-.025em}.desc{font-size:14px;color:var(--muted)}
  @media(min-width:640px){body{padding:48px 20px}.grid{grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}.card{padding:20px}.top{grid-template-columns:1fr auto;align-items:start}.back{order:2}}
</style>
</head>
