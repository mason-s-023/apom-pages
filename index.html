<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APOM Pages</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root{--primary:#4F46E5;--surface-subtle:#F7F6F3;--border:#E8E7E3;--text:#1A1A19;--text-2:#5A5A56;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Pretendard,-apple-system,sans-serif;background:var(--surface-subtle);color:var(--text);padding:48px 24px;line-height:1.6}
  .wrap{max-width:800px;margin:0 auto}
  h1{font-size:24px;font-weight:700;margin-bottom:8px}
  p{color:var(--text-2);font-size:14px;margin-bottom:32px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
  a.card{display:block;background:#fff;border:1px solid var(--border);border-radius:8px;padding:20px;text-decoration:none;color:var(--text);transition:box-shadow .15s}
  a.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
  .card-label{font-size:11px;font-weight:600;color:var(--primary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
  .card-title{font-size:16px;font-weight:600;margin-bottom:4px}
  .card-desc{font-size:13px;color:var(--text-2)}
</style>
</head>
<body>
<div class="wrap">
  <h1>APOM Pages</h1>
  <p>기획서 · 보고서 · 원페이지 모음</p>
  <div class="grid">
    <a class="card" href="./분수물총/">
      <div class="card-label">P4 기획서</div>
      <div class="card-title">분수물총</div>
      <div class="card-desc">상품 성격 · 페르소나 · USP · Story 흐름</div>
    </a>
    <a class="card" href="./reports/">
      <div class="card-label">Reports</div>
      <div class="card-title">HTML 보고서</div>
      <div class="card-desc">차드 의사결정용 보고서 기본 틀 · 운영 보고서 모음</div>
    </a>
  </div>
</div>
</body>
</html>
